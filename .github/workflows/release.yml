name: Release

# Builds Linux + macOS + Windows binaries on every git tag matching v*.*.*
# Each binary is uploaded to the GitHub release for that tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: scamp-x86_64-linux
            binary: scamp
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: scamp-x86_64-macos
            binary: scamp
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: scamp-aarch64-macos
            binary: scamp
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: scamp-x86_64-windows.exe
            binary: scamp.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Attach artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
